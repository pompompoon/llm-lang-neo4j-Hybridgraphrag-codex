<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLMGraphRAG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--panel:#181a24;--border:#2a2d3a;--text:#e0e0e0;--muted:#888;--accent:#2dd4bf;--accent2:#a78bfa;--red:#ef4444;--green:#4ade80;--yellow:#facc15}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:260px;background:var(--panel);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;overflow-y:auto}
.sidebar h2{font-size:16px;color:var(--accent);margin-bottom:12px}
.sidebar h3{font-size:12px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent);font-family:monospace}
.stat-label{font-size:11px;color:var(--muted)}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;width:100%;margin-bottom:6px;transition:.2s}
.btn-primary{background:var(--accent);color:#111}.btn-primary:hover{opacity:.85}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn:disabled{opacity:.4;cursor:default}
select,input[type=text],textarea{width:100%;padding:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;margin-bottom:6px}
textarea{min-height:100px;resize:vertical;line-height:1.5}
.doc-status{font-size:11px;color:var(--muted);min-height:18px;margin-top:2px;line-height:1.4}
.doc-status.ok{color:var(--green)}
.doc-status.ng{color:var(--red)}
.doc-panel{max-width:720px}
.doc-panel textarea{min-height:220px;font-size:14px}
.doc-result{margin-top:14px}
.main{flex:1;display:flex;flex-direction:column}
.tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;padding:20px;display:none}
.tab-content.active{display:block}
.msg{max-width:80%;margin-bottom:12px;padding:10px 16px;border-radius:12px;line-height:1.6;font-size:14px}
.msg-user{background:#2563eb;color:#fff;margin-left:auto;border-radius:12px 12px 4px 12px}
.msg-bot{background:var(--panel);border:1px solid var(--border);border-radius:12px 12px 12px 4px}
.msg-meta{font-size:11px;color:var(--muted);margin-top:6px;border-top:1px solid var(--border);padding-top:4px}
.input-bar{padding:12px 20px;background:var(--panel);border-top:1px solid var(--border);display:flex;gap:8px}
.input-bar input{flex:1;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.input-bar button{padding:10px 20px;background:var(--accent);color:#111;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.result-name{font-weight:600;font-size:14px}.result-type{font-size:11px;color:var(--accent2);margin-left:8px}
.result-score{font-size:12px;color:var(--accent);font-family:monospace}
.badge-new{font-size:10px;background:var(--green);color:#111;padding:1px 6px;border-radius:10px;margin-left:6px}
.slider-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row span{font-size:11px;color:var(--muted);min-width:30px}
canvas{display:block;width:100%;height:100%}
.status{padding:4px 10px;font-size:11px;border-radius:4px;display:inline-block;margin-bottom:8px}
.status-ok{background:rgba(74,222,128,.15);color:var(--green)}
.status-ng{background:rgba(239,68,68,.15);color:var(--red)}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>LLMGraphRAG</h2>
  <div id="healthStatus" class="status status-ng">未接続</div>

  <h3>セットアップ</h3>
  <select id="dataSource">
    <option value="sample">合成データ</option>
    <option value="neo4j">Neo4j</option>
  </select>
  <select id="modelType">
    <option value="graphsage">GraphSAGE</option>
    <option value="gat">GAT</option>
  </select>
  <button class="btn btn-primary" onclick="trainAndEmbed()">Train + Embed</button>
  <div id="trainStatus" style="font-size:11px;color:var(--muted);margin-top:4px"></div>

  <h3>グラフ統計</h3>
  <div class="stat-card"><div class="stat-val" id="statNodes">0</div><div class="stat-label">ノード数</div></div>
  <div class="stat-card"><div class="stat-val" id="statEdges">0</div><div class="stat-label">エッジ数</div></div>
  <div class="stat-card"><div class="stat-val" id="statBase">0</div><div class="stat-label">コミュニティ</div></div>
  <div class="stat-card"><div class="stat-val" id="statNew">0</div><div class="stat-label">チャンク数</div></div>

  <h3>ドキュメント追加</h3>
  <textarea id="docText" placeholder="テキストを貼り付け..."></textarea>
  <input type="text" id="docSource" placeholder="ソース名（任意）">
  <button class="btn btn-primary" id="addDocBtn" onclick="addDocument()">追加して埋め込み更新</button>
  <div id="docStatus" class="doc-status"></div>

  <div style="margin-top:auto;font-size:11px;color:var(--muted)">
    <span id="providerInfo">Provider: -</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('chat')">チャット</div>
    <div class="tab" onclick="switchTab('search')">ハイブリッド検索</div>
    <div class="tab" onclick="switchTab('documents')">ドキュメント追加</div>
    <div class="tab" onclick="switchTab('link')">リンク予測</div>
    <div class="tab" onclick="switchTab('graph')">グラフ</div>
  </div>

  <!-- Chat Tab -->
  <div class="tab-content active" id="tab-chat">
    <div id="chatMessages" style="min-height:200px"></div>
  </div>
  <div class="input-bar" id="chatInput">
    <input type="text" id="chatBox" placeholder="質問を入力... (Enter で送信)" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">送信</button>
  </div>

  <!-- Hybrid Search Tab -->
  <div class="tab-content" id="tab-search">
    <div style="max-width:600px">
      <input type="text" id="searchQuery" placeholder="検索クエリを入力...">
      <div class="slider-row">
        <span>構造</span>
        <input type="range" id="textWeight" min="0" max="100" value="50">
        <span>テキスト</span>
        <span id="twVal">0.50</span>
      </div>
      <button class="btn btn-primary" onclick="doHybridSearch()" style="width:auto;padding:8px 24px">検索</button>
    </div>
    <div id="searchResults" style="margin-top:16px"></div>
  </div>

  <!-- Documents Tab -->
  <div class="tab-content" id="tab-documents">
    <div class="doc-panel">
      <h3 style="margin-bottom:12px;font-size:14px">ドキュメント追加</h3>
      <textarea id="docTextMain" placeholder="テキストを貼り付け..."></textarea>
      <input type="text" id="docSourceMain" placeholder="ソース名（任意）">
      <button class="btn btn-primary" onclick="addDocumentFrom('Main')" style="width:auto;padding:8px 24px">追加してGraphSAGEグラフを更新</button>
      <div id="docStatusMain" class="doc-status"></div>
      <div id="docResultMain" class="doc-result"></div>
    </div>
  </div>

  <!-- Link Prediction Tab -->
  <div class="tab-content" id="tab-link">
    <div style="max-width:600px">
      <h3 style="margin-bottom:12px;font-size:14px">2エンティティ間のリンク予測</h3>
      <input type="text" id="linkA" placeholder="エンティティA（例: Ilya Sutskever）">
      <input type="text" id="linkB" placeholder="エンティティB（例: Sam Altman）">
      <button class="btn btn-primary" onclick="predictLink()" style="width:auto;padding:8px 24px">予測</button>
      <div id="linkResult" style="margin-top:12px"></div>

      <h3 style="margin:24px 0 12px;font-size:14px">グラフ補完の提案</h3>
      <input type="text" id="suggestEntity" placeholder="エンティティ名">
      <button class="btn btn-secondary" onclick="suggestLinks()" style="width:auto;padding:8px 24px">提案を取得</button>
      <div id="suggestResults" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- Graph Tab -->
  <div class="tab-content" id="tab-graph" style="padding:0;position:relative">
    <canvas id="graphCanvas"></canvas>
    <div style="position:absolute;top:12px;right:12px"><button class="btn btn-secondary" onclick="loadGraph()">更新</button></div>
  </div>
</div>

<script>
const API = '';

async function jsonOrThrow(response) {
  let data = {};
  try {
    data = await response.json();
  } catch (_) {
    data = {};
  }
  if (!response.ok) throw new Error(data.detail || `HTTP ${response.status}`);
  return data;
}

// --- Tabs ---
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', t.textContent.includes({chat:'チャット',search:'ハイブリッド',documents:'ドキュメント',link:'リンク',graph:'グラフ'}[name])));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('chatInput').style.display = name==='chat'?'flex':'none';
  if(name==='graph') loadGraph();
}

// --- Health ---
async function checkHealth() {
  try {
    const r = await fetch(API+'/api/health');
    const d = await r.json();
    document.getElementById('healthStatus').className = 'status status-ok';
    document.getElementById('healthStatus').textContent = d.trained ? '✓ 学習済み' : '○ 未学習';
    document.getElementById('providerInfo').textContent = `Provider: ${d.provider} (${d.chat_model})`;
    if(d.trained) loadStats();
  } catch(e) {
    document.getElementById('healthStatus').className = 'status status-ng';
    document.getElementById('healthStatus').textContent = '✗ 接続エラー';
  }
}

async function loadStats() {
  try {
    const r = await fetch(API+'/api/graph/stats');
    const d = await r.json();
    document.getElementById('statNodes').textContent = d.nodes||0;
    document.getElementById('statEdges').textContent = d.edges||0;
    document.getElementById('statBase').textContent = d.communities||0;
    document.getElementById('statNew').textContent = d.chunks||0;
    if(d.model_type) document.getElementById('trainStatus').textContent = `Model: ${d.model_type}`;
  } catch(e) {}
}

// --- Train ---
async function trainAndEmbed() {
  const src = document.getElementById('dataSource').value;
  const modelType = document.getElementById('modelType').value;
  const st = document.getElementById('trainStatus');
  st.textContent = `${modelType} 学習中...`;
  try {
    const r1 = await fetch(API+'/api/graphsage/train', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data_source:src, model_type:modelType})});
    const d1 = await jsonOrThrow(r1);
    st.textContent = `${d1.model_type || modelType} 学習完了 (AUC: ${d1.auc?.toFixed(4)}) 埋め込み生成中...`;
    const r2 = await fetch(API+'/api/graphsage/embed', {method:'POST'});
    const d2 = await jsonOrThrow(r2);
    st.textContent = `完了! ${d2.entities}エンティティ [${d2.shape}]`;
    checkHealth();
  } catch(e) { st.textContent = 'エラー: '+e.message; }
}

// --- Document Add ---
async function addDocument() {
  addDocumentFrom('');
}

async function addDocumentFrom(suffix) {
  const textEl = document.getElementById('docText' + suffix);
  const sourceEl = document.getElementById('docSource' + suffix);
  const btn = suffix ? null : document.getElementById('addDocBtn');
  const st = document.getElementById('docStatus' + suffix);
  const resultEl = document.getElementById('docResult' + suffix);
  const text = textEl.value.trim();
  const source = sourceEl.value.trim();
  const dataSource = document.getElementById('dataSource').value;
  const modelType = document.getElementById('modelType').value;
  if(!text) {
    st.className = 'doc-status ng';
    st.textContent = '追加するテキストを入力してください';
    return;
  }

  if(btn) btn.disabled = true;
  st.className = 'doc-status';
  st.textContent = '追加中...';
  if(resultEl) resultEl.innerHTML = '';
  try {
    const r = await fetch(API+'/api/documents/add', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text, source: source || null, data_source: dataSource, model_type: modelType})
    });
    const d = await jsonOrThrow(r);
    st.className = 'doc-status ok';
    st.textContent = `${d.auto_trained ? '自動学習して' : ''}追加完了: ${d.chunks_added}チャンク / ${d.entities_extracted}エンティティ / ${d.persisted_to || 'memory'}保存`;
    if(resultEl) {
      resultEl.innerHTML = `<div class="result-card"><span class="result-name">${esc(d.document)}</span><div class="result-score">nodes: ${d.stats?.nodes||0} | edges: ${d.stats?.edges||0} | chunks: ${d.stats?.chunks||0} | documents: ${d.stats?.documents||0}</div></div>`;
    }
    textEl.value = '';
    loadStats();
    if(document.getElementById('tab-graph').classList.contains('active')) loadGraph();
  } catch(e) {
    st.className = 'doc-status ng';
    st.textContent = 'エラー: '+e.message;
  } finally {
    if(btn) btn.disabled = false;
  }
}

// --- Chat ---
function buildMetricsMeta(d) {
  const m = d.metrics || {};
  const f = v => (v === undefined || v === null) ? '-' : Number(v).toFixed(2);
  let line1 = `総合品質: ${f(d.quality_score)} | 忠実性: ${f(m.faithfulness)} | 回答関連性: ${f(m.answer_relevancy)} | ` +
              `コンテキスト関連性: ${f(m.context_relevancy)} | 数値根拠率: ${f(m.grounded_numbers)}`;
  let line2 = `リトライ: ${(d.retry_count||1)-1}回 | ヒット: ${d.search_results?.length||0}件`;
  if (m.llm_overall !== undefined) {
    line2 = `LLM評価: ${f(m.llm_overall)} (忠実 ${f(m.llm_faithfulness)} / 関連 ${f(m.llm_relevancy)} / 完全 ${f(m.llm_completeness)}) | ` + line2;
  }
  return `<div class="msg-meta">${line1}<br>${line2}</div>`;
}

async function sendChat() {
  const box = document.getElementById('chatBox');
  const msg = box.value.trim();
  if(!msg) return;
  box.value = '';
  const area = document.getElementById('chatMessages');
  area.innerHTML += `<div class="msg msg-user">${esc(msg)}</div>`;
  area.innerHTML += `<div class="msg msg-bot" id="botPending">考え中...</div>`;
  area.scrollTop = area.scrollHeight;
  try {
    const r = await fetch(API+'/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg})});
    const d = await jsonOrThrow(r);
    const el = document.getElementById('botPending');
    el.id = '';
    el.innerHTML = esc(d.answer) + buildMetricsMeta(d);
  } catch(e) {
    document.getElementById('botPending').textContent = 'エラー: '+e.message;
    document.getElementById('botPending').id = '';
  }
  area.scrollTop = area.scrollHeight;
}

// --- Hybrid Search ---
document.getElementById('textWeight').addEventListener('input', e => {
  document.getElementById('twVal').textContent = (e.target.value/100).toFixed(2);
});
async function doHybridSearch() {
  const q = document.getElementById('searchQuery').value.trim();
  if(!q) return;
  const tw = document.getElementById('textWeight').value / 100;
  const area = document.getElementById('searchResults');
  area.innerHTML = '検索中...';
  try {
    const r = await fetch(API+'/api/search/hybrid', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, text_weight:tw})});
    const d = await jsonOrThrow(r);
    area.innerHTML = d.results.map(r => `<div class="result-card"><span class="result-name">${esc(r.name)}</span><span class="result-type">${r.type}</span>${r.is_new?'<span class="badge-new">NEW</span>':''}<div class="result-score">total: ${r.score} | text: ${r.text_score} | struct: ${r.struct_score}</div></div>`).join('') || '<div style="color:var(--muted)">結果なし</div>';
  } catch(e) { area.innerHTML = 'エラー: '+e.message; }
}

// --- Link Prediction ---
async function predictLink() {
  const a=document.getElementById('linkA').value.trim(), b=document.getElementById('linkB').value.trim();
  if(!a||!b) return;
  const area = document.getElementById('linkResult');
  try {
    const r = await fetch(API+'/api/links/predict', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({entity_a:a, entity_b:b})});
    const d = await r.json();
    const pct = (d.link_probability*100).toFixed(1);
    const exists = d.existing_edge ? '<span style="color:var(--green)">✓ 既存エッジ</span>' : '<span style="color:var(--muted)">✗ 未接続</span>';
    area.innerHTML = `<div class="result-card"><strong>${esc(a)} ↔ ${esc(b)}</strong><div style="font-size:28px;color:var(--accent);font-weight:700;margin:8px 0">${pct}%</div>${exists}</div>`;
  } catch(e) { area.innerHTML = 'エラー: '+e.message; }
}
async function suggestLinks() {
  const name = document.getElementById('suggestEntity').value.trim();
  if(!name) return;
  const area = document.getElementById('suggestResults');
  try {
    const r = await fetch(API+`/api/links/suggest/${encodeURIComponent(name)}`);
    const d = await r.json();
    area.innerHTML = (d.suggestions||[]).map(s => `<div class="result-card"><span class="result-name">${esc(s.name)}</span><span class="result-type">${s.type}</span>${s.is_new?'<span class="badge-new">NEW</span>':''}<div class="result-score">リンク確率: ${(s.link_probability*100).toFixed(1)}%</div></div>`).join('') || '提案なし';
  } catch(e) { area.innerHTML = 'エラー: '+e.message; }
}

// --- Graph Canvas ---
let graphNodes=[], graphEdges=[], gAnimId=null;
async function loadGraph() {
  try {
    const r = await fetch(API+'/api/graph/data');
    const d = await r.json();
    graphNodes = d.nodes.map(n => ({...n, x:0, y:0, vx:0, vy:0}));
    graphEdges = d.edges;
    initGraphSim();
  } catch(e) {}
}
const TYPE_COLORS = {person:'#ef4444',organization:'#2dd4bf',technology:'#a78bfa',concept:'#60a5fa',event:'#f472b6',document:'#facc15',chunk:'#94a3b8'};
function initGraphSim() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = devicePixelRatio||1;
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth*dpr; canvas.height = parent.clientHeight*dpr;
  canvas.style.width = parent.clientWidth+'px'; canvas.style.height = parent.clientHeight+'px';
  const W=parent.clientWidth, H=parent.clientHeight;
  const nMap = {}; graphNodes.forEach(n => nMap[n.id]=n);
  graphNodes.forEach((n,i) => { const a=i/graphNodes.length*Math.PI*2; n.x=W/2+Math.cos(a)*200; n.y=H/2+Math.sin(a)*200; });
  if(gAnimId) cancelAnimationFrame(gAnimId);
  let alpha=1;
  function tick() {
    for(let i=0;i<graphNodes.length;i++) for(let j=i+1;j<graphNodes.length;j++) {
      const a=graphNodes[i],b=graphNodes[j]; let dx=b.x-a.x||.1,dy=b.y-a.y||.1,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2),f=-400/d2;
      a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;
    }
    graphEdges.forEach(e => { const s=nMap[e.source],t=nMap[e.target]; if(!s||!t)return; let dx=t.x-s.x,dy=t.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-100)*.005; s.vx+=dx/d*f;s.vy+=dy/d*f;t.vx-=dx/d*f;t.vy-=dy/d*f; });
    graphNodes.forEach(n => { n.vx+=(W/2-n.x)*.0003;n.vy+=(H/2-n.y)*.0003;n.vx*=.82;n.vy*=.82;n.x+=n.vx*alpha;n.y+=n.vy*alpha; });
    alpha=Math.max(.001,alpha*.995);
    ctx.save();ctx.scale(dpr,dpr);ctx.fillStyle='#0f1117';ctx.fillRect(0,0,W,H);
    graphEdges.forEach(e => { const s=nMap[e.source],t=nMap[e.target]; if(!s||!t)return; ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.stroke(); if(e.relation){const mx=(s.x+t.x)/2,my=(s.y+t.y)/2;ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,255,255,.4)';ctx.textAlign='center';ctx.fillText(e.relation,mx,my-4);} });
    graphNodes.forEach(n => { const c=TYPE_COLORS[n.type]||'#888',r=16; ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=c+'88';ctx.fill();ctx.strokeStyle=n.is_new?'#4ade80':c;ctx.lineWidth=n.is_new?3:1;ctx.stroke(); ctx.font='bold 12px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(n.label,n.x,n.y+r+4); });
    ctx.restore(); gAnimId=requestAnimationFrame(tick);
  }
  tick();
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Init
checkHealth();
</script>
</body>
</html>
